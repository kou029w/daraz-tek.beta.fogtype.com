name: daraz-tek
services:
  reverse-proxy:
    image: alpine@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
    restart: unless-stopped
    init: true
    command: sleep infinity
    networks:
      - traefik
    labels:
      traefik.enable: "true"
      traefik.http.routers.daraztek_reverse_proxy.rule: "Host(`daraz-tek.beta.fogtype.com`)"
      traefik.http.services.daraztek_reverse_proxy.loadbalancer.server.url: http://rho.fogtype.com:8065
networks:
  traefik:
    external: true
